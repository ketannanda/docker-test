# GitHub Actions Workflow – Master Build & Auto Tag Creation

Create this file inside your repository:

`.github/workflows/master-build.yml`

```yaml
name: Master Build and Tag Creation

on:
  push:
    branches:
      - master

jobs:
  build-and-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean build

      - name: Generate Tag
        id: tag
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Success Message
        run: echo "Build completed and tag created successfully"
```

## What This Workflow Does

* Runs automatically whenever code is pushed to the `master` branch
* Builds the project using Gradle
* Creates a Git tag automatically
* Pushes the tag to GitHub

## Example Generated Tags

```text
v2026.05.08-1
v2026.05.08-2
```

## Important Notes

### If You Are Using Maven

Replace:

```yaml
run: ./gradlew clean build
```

with:

```yaml
run: mvn clean install
```

### If Your Default Branch Is `main`

Replace:

```yaml
- master
```

with:

```yaml
- main
```

## How To Add This Workflow

1. Open your GitHub repository
2. Create folder:

```text
.github/workflows
```

3. Create file:

```text
master-build.yml
```

4. Paste the workflow code
5. Commit and push the changes

After that, every push to master will:

* Trigger build
* Create tag automatically
* Push tag to GitHub
